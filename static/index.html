<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객서비스 챗봇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 480px;
      height: 700px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 헤더 */
    .header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    select {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    select option { background: #1a73e8; color: #fff; }

    .btn-clear {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-clear:hover { background: rgba(255,255,255,0.3); }

    /* 메시지 영역 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .message { display: flex; flex-direction: column; max-width: 80%; }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }

    .message .time {
      font-size: 10px;
      color: #9aa0a6;
      margin-top: 4px;
      padding: 0 4px;
    }

    /* 타이핑 인디케이터 */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 14px;
      background: #f1f3f4;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 6px; height: 6px;
      background: #9aa0a6;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 입력 영역 */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      border: 1px solid #e8eaed;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #1a73e8; }

    .btn-send {
      width: 40px; height: 40px;
      background: #1a73e8;
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .btn-send:hover { background: #1557b0; }
    .btn-send:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <div class="header-left">
        <div class="header-icon">🤖</div>
        <div>
          <h1>고객서비스 챗봇</h1>
          <p>문서 기반 RAG 챗봇</p>
        </div>
      </div>
      <div class="header-right">
        <select id="modelSelect">
          <option value="groq">Groq (Llama)</option>
          <option value="gemini">Gemini</option>
          <option value="solar">Solar Pro</option>
        </select>
        <button class="btn-clear" onclick="clearHistory()">초기화</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">
        <div class="bubble">안녕하세요! 무엇이든 물어보세요 😊</div>
        <div class="time" id="initTime"></div>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="questionInput"
        placeholder="질문을 입력하세요..."
        onkeydown="handleKeydown(event)"
      />
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const sessionId = "session_" + Math.random().toString(36).slice(2, 9);

    document.getElementById("initTime").textContent = now();

    function now() {
      return new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    }

    function handleKeydown(e) {
      if (e.key === "Enter" && !e.shiftKey) sendMessage();
    }

    function appendMessage(role, text) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="bubble">${text.replace(/\n/g, "<br>")}</div>
        <div class="time">${now()}</div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showTyping() {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message bot";
      div.id = "typing";
      div.innerHTML = `
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    async function sendMessage() {
      const input = document.getElementById("questionInput");
      const question = input.value.trim();
      if (!question) return;

      const model = document.getElementById("modelSelect").value;
      const sendBtn = document.getElementById("sendBtn");

      input.value = "";
      sendBtn.disabled = true;

      appendMessage("user", question);
      showTyping();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, session_id: sessionId, model }),
        });

        const data = await res.json();
        removeTyping();

        if (res.ok) {
          appendMessage("bot", data.answer);
        } else {
          appendMessage("bot", "오류가 발생했습니다: " + data.detail);
        }
      } catch (e) {
        removeTyping();
        appendMessage("bot", "서버에 연결할 수 없습니다.");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    async function clearHistory() {
      await fetch("/clear", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId }),
      });

      const messages = document.getElementById("messages");
      messages.innerHTML = `
        <div class="message bot">
          <div class="bubble">대화 히스토리가 초기화되었습니다 🗑️</div>
          <div class="time">${now()}</div>
        </div>
      `;
    }
  </script>
</body>
</html>
