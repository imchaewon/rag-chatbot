<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객서비스 챗봇</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* 전체 레이아웃 */
    .app-container {
      display: flex;
      width: 900px;
      height: 700px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    /* 사이드바 */
    .sidebar {
      width: 250px;
      background: #171717;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .btn-new-chat {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .btn-new-chat:hover { background: rgba(255,255,255,0.15); }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .session-item {
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      color: #aaa;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .session-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .session-item.active { background: rgba(255,255,255,0.12); color: #fff; }
    .session-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-delete-session {
      flex-shrink: 0;
      background: none;
      border: none;
      color: transparent;
      font-size: 13px;
      cursor: pointer;
      padding: 1px 3px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .session-item:hover .btn-delete-session { color: #888; }
    .btn-delete-session:hover { color: #fff !important; background: rgba(255,255,255,0.15); }

    .session-empty {
      padding: 20px 10px;
      color: #555;
      font-size: 12px;
      text-align: center;
    }

    /* 문서 관리 패널 */
    .doc-panel {
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .doc-panel-header {
      padding: 10px 12px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      transition: color 0.15s;
    }
    .doc-panel-header:hover { color: #ccc; }
    .doc-panel-header .doc-panel-arrow { font-size: 10px; transition: transform 0.2s; }
    .doc-panel-header.open .doc-panel-arrow { transform: rotate(180deg); }
    .doc-panel-body { display: none; padding: 0 8px 8px; }
    .doc-panel-body.open { display: block; }
    .doc-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 6px;
      border-radius: 6px;
      font-size: 12px;
      color: #aaa;
    }
    .doc-item:hover { background: rgba(255,255,255,0.06); }
    .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-delete-doc {
      flex-shrink: 0;
      background: none;
      border: none;
      color: transparent;
      font-size: 12px;
      cursor: pointer;
      padding: 1px 3px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    .doc-item:hover .btn-delete-doc { color: #666; }
    .btn-delete-doc:hover { color: #fff !important; background: rgba(255,255,255,0.15); }
    .btn-upload-doc {
      width: 100%;
      margin-top: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px dashed rgba(255,255,255,0.2);
      color: #888;
      padding: 7px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .btn-upload-doc:hover { background: rgba(255,255,255,0.12); color: #ccc; }

    /* 채팅 영역 */
    .chat-container {
      flex: 1;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* 헤더 */
    .header {
      background: #1a73e8;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    select {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      height: 28px;
      box-sizing: border-box;
    }
    .btn-clear {
      height: 28px;
      box-sizing: border-box;
    }
    select option { background: #1a73e8; color: #fff; }

    .btn-clear {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      line-height: 1;
    }
    .btn-clear:hover { background: rgba(255,255,255,0.3); }

    /* 메시지 영역 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .message { display: flex; flex-direction: column; max-width: 80%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }
    .message .time {
      font-size: 10px;
      color: #9aa0a6;
      margin-top: 4px;
      padding: 0 4px;
    }

    /* 생각 중 물결 애니메이션 */
    .thinking {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 2px 0;
    }
    .thinking span {
      width: 7px;
      height: 7px;
      background: #9aa0a6;
      border-radius: 50%;
      animation: thinking-wave 1.4s ease-in-out infinite;
      opacity: 0.4;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes thinking-wave {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* 타이핑 인디케이터 */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 14px;
      background: #f1f3f4;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 6px; height: 6px;
      background: #9aa0a6;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 입력 영역 */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      border: 1px solid #e8eaed;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #1a73e8; }

    .btn-send {
      width: 40px; height: 40px;
      background: #1a73e8;
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .btn-send:hover { background: #1557b0; }
    .btn-send:disabled { background: #ccc; cursor: not-allowed; }

    .btn-stop {
      width: 40px; height: 40px;
      background: #ea4335;
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .btn-stop:hover { background: #c5221f; }

    /* 마크다운 스타일 */
    .bubble p { margin: 0 0 6px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }
    .bubble code {
      background: rgba(0,0,0,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      font-family: monospace;
    }
    .bubble pre {
      background: rgba(0,0,0,0.08);
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble strong { font-weight: 600; }

    /* 복사 버튼 */
    .message-actions {
      display: flex;
      gap: 4px;
      margin-top: 3px;
      padding: 0 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .message.bot:hover .message-actions { opacity: 1; }
    .btn-copy {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 13px;
      cursor: pointer;
      color: #9aa0a6;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:hover { background: #f1f3f4; color: #202124; border-color: #bbb; }

    /* 피드백 버튼 */
    .feedback-row {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      padding: 0 4px;
    }
    .btn-feedback {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 13px;
      cursor: pointer;
      color: #9aa0a6;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-feedback:hover { background: #f1f3f4; color: #202124; border-color: #bbb; }
    .btn-feedback.active-up { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
    .btn-feedback.active-down { background: #fce4ec; border-color: #e91e63; color: #880e4f; }

    /* 소스 문서 표시 */
    .sources {
      font-size: 11px;
      color: #9aa0a6;
      margin-top: 4px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .sources span {
      background: #f1f3f4;
      padding: 1px 7px;
      border-radius: 10px;
    }

    /* 추천 검색어 칩 */
    .suggestions {
      display: flex;
      gap: 6px;
      padding: 0 16px 10px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .suggestions::-webkit-scrollbar { display: none; }
    .chip {
      background: #fff;
      border: 1px solid #d2e3fc;
      border-radius: 16px;
      padding: 6px 12px;
      font-size: 12px;
      color: #1a73e8;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .chip:hover { background: #e8f0fe; }

    /* 통계 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: 440px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-header h2 { font-size: 16px; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #9aa0a6;
      line-height: 1;
    }
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid #f1f3f4;
      font-size: 13px;
      gap: 8px;
    }
    .stat-item:last-child { border-bottom: none; }
    .stat-question { flex: 1; color: #202124; }
    .stat-count {
      background: #1a73e8;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="modal-overlay" id="statsModal" onclick="hideStats(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>자주 묻는 질문 TOP 20</h2>
        <button class="modal-close" onclick="document.getElementById('statsModal').style.display='none'">✕</button>
      </div>
      <div id="statsList"></div>
    </div>
  </div>

  <div class="app-container">
    <!-- 사이드바 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <button class="btn-new-chat" onclick="newChat()">✏️ 새 대화</button>
      </div>
      <div class="session-list" id="sessionList"></div>
      <div class="doc-panel">
        <div class="doc-panel-header" id="docPanelHeader" onclick="toggleDocPanel()">
          <span>📁 문서 관리</span>
          <span class="doc-panel-arrow">▼</span>
        </div>
        <div class="doc-panel-body" id="docPanelBody">
          <div id="docList"></div>
          <button class="btn-upload-doc" onclick="document.getElementById('fileInput').click()">
            + txt / pdf 업로드
          </button>
          <input type="file" id="fileInput" accept=".txt,.pdf" style="display:none" onchange="uploadDocument(this)" />
        </div>
      </div>
    </div>

    <!-- 채팅 영역 -->
    <div class="chat-container">
      <div class="header">
        <div class="header-left">
          <div class="header-icon">🤖</div>
          <div>
            <h1>고객서비스 챗봇</h1>
            <p>문서 기반 RAG 챗봇</p>
          </div>
        </div>
        <div class="header-right">
          <select id="modelSelect">
            <option value="qwen3b">qwen2.5:3b (로컬)</option>
            <option value="ollama">qwen2.5:7b (로컬)</option>
            <option value="llama">llama3.1:8b (로컬)</option>
            <option value="groq">Groq (Llama)</option>
            <option value="gemini">Gemini</option>
            <option value="solar">Solar Pro</option>
          </select>
          <button class="btn-clear" onclick="showStats()">📊</button>
          <button class="btn-clear" onclick="exportChat()" title="대화 내보내기">⬇</button>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="message bot">
          <div class="bubble">안녕하세요! 무엇이든 물어보세요 😊</div>
          <div class="time" id="initTime"></div>
        </div>
      </div>

      <div class="suggestions" id="suggestions"></div>
      <div class="input-area">
        <input
          type="text"
          id="questionInput"
          placeholder="질문을 입력하세요..."
          onkeydown="handleKeydown(event)"
        />
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
        <button class="btn-stop" id="stopBtn" onclick="stopStreaming()">■</button>
      </div>
      <div style="padding: 6px 16px 10px; display:flex; align-items:center; gap:6px; font-size:12px; color:#666;">
        <input type="checkbox" id="graphMode" />
        <label for="graphMode">LangGraph 모드 (관련성 판단 후 답변)</label>
      </div>
    </div>
  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    let currentSessionId = "session_" + Math.random().toString(36).slice(2, 9);
    let abortController = null;

    document.getElementById("initTime").textContent = now();

    function now() {
      return new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    }

    function handleKeydown(e) {
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing) sendMessage();
    }

    // ── 사이드바 ──────────────────────────────────────────────────────

    async function loadSessionList() {
      const res = await fetch("/sessions");
      const data = await res.json();
      const list = document.getElementById("sessionList");

      if (data.sessions.length === 0) {
        list.innerHTML = `<div class="session-empty">대화 기록이 없습니다</div>`;
        return;
      }

      list.innerHTML = data.sessions.map(s => {
        const title = s.title.length > 22 ? s.title.slice(0, 22) + "…" : s.title;
        const active = s.session_id === currentSessionId ? " active" : "";
        return `
          <div class="session-item${active}" data-sid="${s.session_id}">
            <span class="session-title">${title}</span>
            <button class="btn-delete-session" data-sid="${s.session_id}" title="삭제">✕</button>
          </div>`;
      }).join("");

      list.querySelectorAll(".session-item").forEach(el => {
        el.addEventListener("click", (e) => {
          if (e.target.classList.contains("btn-delete-session")) return;
          selectSession(el.dataset.sid);
        });
      });

      list.querySelectorAll(".btn-delete-session").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteSession(btn.dataset.sid);
        });
      });
    }

    async function selectSession(sessionId) {
      currentSessionId = sessionId;

      document.querySelectorAll(".session-item").forEach(el => {
        el.classList.toggle("active", el.dataset.sid === sessionId);
      });

      const res = await fetch(`/sessions/${sessionId}`);
      const data = await res.json();

      const messages = document.getElementById("messages");
      messages.innerHTML = "";
      data.history.forEach(msg => {
        appendMessage(msg.role === "human" ? "user" : "bot", msg.content, "");
      });
      messages.scrollTop = messages.scrollHeight;

      document.getElementById("suggestions").style.display = "none";
    }

    function newChat() {
      currentSessionId = "session_" + Math.random().toString(36).slice(2, 9);

      document.querySelectorAll(".session-item").forEach(el => el.classList.remove("active"));

      document.getElementById("messages").innerHTML = `
        <div class="message bot">
          <div class="bubble">안녕하세요! 무엇이든 물어보세요 😊</div>
          <div class="time">${now()}</div>
        </div>
      `;

      const suggestions = document.getElementById("suggestions");
      suggestions.style.display = "flex";
      document.getElementById("questionInput").focus();
    }

    // ── 메시지 ───────────────────────────────────────────────────────

    function appendMessage(role, text, time = now()) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      const content = role === "bot" ? marked.parse(text) : text.replace(/\n/g, "<br>");
      div.innerHTML = `<div class="bubble">${content}</div><div class="time">${time}</div>`;
      if (role === "bot" && text) {
        const actionsEl = document.createElement("div");
        actionsEl.className = "message-actions";
        const copyBtn = document.createElement("button");
        copyBtn.className = "btn-copy";
        copyBtn.textContent = "📋";
        copyBtn.addEventListener("click", () => copyToClipboard(copyBtn, text));
        actionsEl.appendChild(copyBtn);
        div.appendChild(actionsEl);
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function stopStreaming() {
      if (abortController) abortController.abort();
    }

    function setStreaming(active) {
      document.getElementById("sendBtn").disabled = active;
      document.getElementById("stopBtn").style.display = active ? "flex" : "none";
    }

    async function sendMessage() {
      const input = document.getElementById("questionInput");
      const question = input.value.trim();
      if (!question) return;

      const model = document.getElementById("modelSelect").value;
      const graphMode = document.getElementById("graphMode").checked;

      input.value = "";
      appendMessage("user", question);
      document.getElementById("suggestions").style.display = "none";
      setStreaming(true);

      const endpoint = graphMode ? "/chat-graph-stream" : "/chat-stream";
      await streamMessage(question, model, endpoint);
      setStreaming(false);
      input.focus();
      loadSessionList();
    }

    async function streamMessage(question, model, endpoint = "/chat-stream") {
      const messages = document.getElementById("messages");

      const div = document.createElement("div");
      div.className = "message bot";
      div.innerHTML = `<div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div><div class="time">${now()}</div>`;
      messages.appendChild(div);
      const bubble = div.querySelector(".bubble");

      let fullText = "";
      let isFirstToken = true;
      abortController = new AbortController();

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, session_id: currentSessionId, model }),
          signal: abortController.signal,
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop();

          for (const part of parts) {
            if (!part.startsWith("data: ")) continue;
            const data = JSON.parse(part.slice(6));

            if (data.type === "error") {
              bubble.innerHTML = `<span style="color:#ea4335">⚠️ ${data.content}</span>`;
            } else if (data.type === "status" || data.type === "retry") {
              fullText = "";
              bubble.innerHTML = `<em style="color:#999">${data.content}</em>`;
            } else if (data.type === "token") {
              if (isFirstToken) { bubble.innerHTML = ""; isFirstToken = false; }
              fullText += data.content;
              bubble.innerHTML = marked.parse(fullText);
              messages.scrollTop = messages.scrollHeight;
            } else if (data.type === "done") {
              bubble.innerHTML = marked.parse(fullText);
              if (data.sources && data.sources.length > 0) {
                const sourcesEl = document.createElement("div");
                sourcesEl.className = "sources";
                sourcesEl.innerHTML = `📄 참고: ${data.sources.map(s => `<span>${s}</span>`).join("")}`;
                div.appendChild(sourcesEl);
              }
              if (fullText) {
                const fbRow = document.createElement("div");
                fbRow.className = "feedback-row";

                const thumbUp = document.createElement("button");
                thumbUp.className = "btn-feedback";
                thumbUp.dataset.rating = "1";
                thumbUp.title = "도움됨";
                thumbUp.textContent = "👍";

                const thumbDown = document.createElement("button");
                thumbDown.className = "btn-feedback";
                thumbDown.dataset.rating = "-1";
                thumbDown.title = "도움 안됨";
                thumbDown.textContent = "👎";

                const copyBtn = document.createElement("button");
                copyBtn.className = "btn-copy";
                copyBtn.style.marginLeft = "auto";
                copyBtn.textContent = "📋";
                copyBtn.addEventListener("click", () => copyToClipboard(copyBtn, fullText));

                [thumbUp, thumbDown].forEach(btn => {
                  btn.addEventListener("click", () => submitFeedback(question, fullText, parseInt(btn.dataset.rating), fbRow));
                });

                fbRow.appendChild(thumbUp);
                fbRow.appendChild(thumbDown);
                fbRow.appendChild(copyBtn);
                div.appendChild(fbRow);
              }
              messages.scrollTop = messages.scrollHeight;
            }
          }
        }
      } catch (e) {
        if (e.name !== "AbortError") {
          bubble.textContent = "서버에 연결할 수 없습니다.";
        }
      } finally {
        abortController = null;
      }
    }

    // ── 추천 검색어 ──────────────────────────────────────────────────

    async function loadSuggestions() {
      const res = await fetch("/suggestions");
      const data = await res.json();
      const container = document.getElementById("suggestions");
      container.innerHTML = data.suggestions.map(q =>
        `<button class="chip" data-q="${q.replace(/"/g, "&quot;")}">${q}</button>`
      ).join("");
      container.querySelectorAll(".chip").forEach(btn => {
        btn.addEventListener("click", () => {
          document.getElementById("questionInput").value = btn.dataset.q;
          sendMessage();
        });
      });
    }

    // ── 통계 ─────────────────────────────────────────────────────────

    async function showStats() {
      const modal = document.getElementById("statsModal");
      const list = document.getElementById("statsList");
      modal.style.display = "flex";
      list.innerHTML = `<p style="color:#9aa0a6; font-size:13px; text-align:center; padding:20px">로딩 중...</p>`;

      const [statsRes, fbRes] = await Promise.all([fetch("/stats"), fetch("/feedback/stats")]);
      const data = await statsRes.json();
      const fb = await fbRes.json();

      let html = "";

      // 👎 받은 답변 섹션
      const negatives = fb.recent.filter(r => r.rating === -1);
      html += `<div style="font-size:12px;color:#9aa0a6;margin-bottom:6px;">`;
      if (fb.total > 0) {
        html += `피드백 👍 ${fb.positive} &nbsp; 👎 ${fb.negative}`;
      } else {
        html += `피드백 없음`;
      }
      html += `</div>`;

      if (negatives.length > 0) {
        html += negatives.map(r => `
          <div style="background:#fff5f5;border:1px solid #fce4ec;border-radius:8px;padding:10px 12px;margin-bottom:8px;">
            <div style="font-size:12px;font-weight:600;color:#202124;margin-bottom:4px;">Q. ${r.question.length > 60 ? r.question.slice(0, 60) + "…" : r.question}</div>
            <div style="font-size:11px;color:#888;line-height:1.5;">${r.answer.length > 100 ? r.answer.slice(0, 100) + "…" : r.answer}</div>
          </div>
        `).join("");
      } else {
        html += `<p style="color:#9aa0a6;font-size:12px;padding:8px 0 16px">👎 받은 답변이 없습니다.</p>`;
      }

      // 자주 묻는 질문 섹션
      html += `<div style="font-size:12px;color:#9aa0a6;margin:10px 0 6px;padding-top:10px;border-top:1px solid #f1f3f4;">자주 묻는 질문 TOP 20</div>`;
      if (data.questions.length === 0) {
        html += `<p style="color:#9aa0a6; font-size:13px; text-align:center; padding:12px">아직 질문 기록이 없습니다.</p>`;
      } else {
        html += data.questions.map((q, i) => `
          <div class="stat-item">
            <span class="stat-question">${i + 1}. ${q.question.length > 45 ? q.question.slice(0, 45) + "…" : q.question}</span>
            <span class="stat-count">${q.count}회</span>
          </div>
        `).join("");
      }

      list.innerHTML = html;
    }

    function hideStats(e) {
      if (e.target === document.getElementById("statsModal")) {
        document.getElementById("statsModal").style.display = "none";
      }
    }

    // ── 세션 삭제 ─────────────────────────────────────────────────────

    async function deleteSession(sessionId) {
      await fetch(`/sessions/${sessionId}`, { method: "DELETE" });

      if (sessionId === currentSessionId) {
        newChat();
      }
      loadSessionList();
    }

    // ── 문서 관리 ─────────────────────────────────────────────────────

    function toggleDocPanel() {
      const header = document.getElementById("docPanelHeader");
      const body = document.getElementById("docPanelBody");
      header.classList.toggle("open");
      body.classList.toggle("open");
      if (body.classList.contains("open")) loadDocList();
    }

    async function loadDocList() {
      const res = await fetch("/documents");
      const data = await res.json();
      const list = document.getElementById("docList");
      if (data.documents.length === 0) {
        list.innerHTML = `<div style="font-size:11px;color:#555;padding:4px 6px">인덱싱된 문서 없음</div>`;
        return;
      }
      list.innerHTML = data.documents.map(name => `
        <div class="doc-item">
          <span class="doc-name" title="${name}">📄 ${name}</span>
          <button class="btn-delete-doc" onclick="deleteDocument('${name}')" title="삭제">✕</button>
        </div>
      `).join("");
    }

    async function uploadDocument(input) {
      const file = input.files[0];
      if (!file) return;
      input.value = "";

      const formData = new FormData();
      formData.append("file", file);

      const btn = document.querySelector(".btn-upload-doc");
      btn.textContent = "업로드 중...";
      btn.disabled = true;

      try {
        const res = await fetch("/documents", { method: "POST", body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        btn.textContent = "✓ " + data.message;
        setTimeout(() => { btn.textContent = "+ txt / pdf 업로드"; btn.disabled = false; }, 2000);
        loadDocList();
      } catch (e) {
        btn.textContent = "⚠️ " + e.message;
        setTimeout(() => { btn.textContent = "+ txt / pdf 업로드"; btn.disabled = false; }, 3000);
      }
    }

    async function deleteDocument(filename) {
      await fetch(`/documents/${encodeURIComponent(filename)}`, { method: "DELETE" });
      loadDocList();
    }

    // ── 복사 ─────────────────────────────────────────────────────────

    function copyToClipboard(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "✓ 복사됨";
        setTimeout(() => { btn.textContent = "📋"; }, 2000);
      });
    }

    // ── 대화 내보내기 ─────────────────────────────────────────────────

    async function exportChat() {
      const res = await fetch(`/sessions/${currentSessionId}`);
      const data = await res.json();
      if (!data.history || data.history.length === 0) return;

      const lines = [
        "=== MSP 운영 도우미 챗봇 대화 내보내기 ===",
        `날짜: ${new Date().toLocaleString("ko-KR")}`,
        "",
      ];
      data.history.forEach(msg => {
        lines.push(msg.role === "human" ? "[사용자]" : "[챗봇]");
        lines.push(msg.content);
        lines.push("");
      });

      const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `chat_${new Date().toISOString().slice(0, 10)}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── 피드백 ───────────────────────────────────────────────────────

    async function submitFeedback(question, answer, rating, rowEl) {
      rowEl.querySelectorAll(".btn-feedback").forEach(b => b.disabled = true);
      try {
        await fetch("/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: currentSessionId, question, answer, rating }),
        });
        rowEl.querySelectorAll(".btn-feedback").forEach(b => {
          b.classList.remove("active-up", "active-down");
          if (parseInt(b.dataset.rating) === rating) {
            b.classList.add(rating === 1 ? "active-up" : "active-down");
          }
        });
      } catch (e) {
        rowEl.querySelectorAll(".btn-feedback").forEach(b => b.disabled = false);
      }
    }

    // ── 초기 로드 ─────────────────────────────────────────────────────

    // 마지막 선택 모델 복원
    const modelSelect = document.getElementById("modelSelect");
    const savedModel = localStorage.getItem("selectedModel");
    if (savedModel) modelSelect.value = savedModel;
    modelSelect.addEventListener("change", () => {
      localStorage.setItem("selectedModel", modelSelect.value);
    });

    loadSuggestions();
    loadSessionList();
  </script>
</body>
</html>
